version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: price-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - price-network

  grafana:
    image: grafana/grafana:latest
    container_name: price-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - price-network
    depends_on:
      - prometheus

volumes:
  grafana_data:

networks:
  price-network:
    external: true   # utilise le même réseau que docker-compose.yml principal
    name: docker_price-network