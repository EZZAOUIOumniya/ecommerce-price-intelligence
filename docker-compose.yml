services:
  # --- 1. DATABASE (Airflow & dbt Backend) ---
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - data-tier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  # --- 2. MESSAGING (Kafka) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - data-tier
    healthcheck:
      test: ["CMD-SHELL", "echo stat | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # CORRECTION : On sépare les noms de listeners et les ports internes
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    command: >
      bash -c "sleep 15 && /etc/confluent/docker/run"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      retries: 5
    networks:
      - data-tier

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # Utilise le listener interne
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - data-tier

  # --- 3. STORAGE (Bigtable Emulator) ---
  bigtable:
    image: google/cloud-sdk:latest
    container_name: bigtable
    ports:
      - "8086:8086"
    networks:
      - data-tier
    command: gcloud beta emulators bigtable start --host-port=0.0.0.0:8086
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/8086' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bigtable-init:
    image: google/cloud-sdk:latest
    container_name: bigtable-init
    depends_on:
      bigtable:
        condition: service_healthy
    networks:
      - data-tier
    environment:
      - BIGTABLE_EMULATOR_HOST=bigtable:8086
    command: >
      bash -c "sleep 10 && 
               cbt -project=test-project -instance=test-instance createtable price_history || true &&
               cbt -project=test-project -instance=test-instance createfamily price_history price_cf || true"

  # --- 4. ORCHESTRATION (Airflow) ---
  airflow-common: &airflow-common
    build: .
    networks:
      - data-tier
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__PARALLELISM=32
      # CORRECTION : Airflow utilise le port de communication interne
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - BIGTABLE_EMULATOR_HOST=bigtable:8086
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scrapers:/opt/airflow/scrapers
      - ./airflow_logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
    user: "${AIRFLOW_UID:-1000}:0"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: bash -c "airflow db migrate && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin && airflow webserver"
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      bigtable: { condition: service_healthy }

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: bash -c "airflow db migrate && airflow scheduler"
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      bigtable: { condition: service_healthy }

  # --- 5. INGESTION (NiFi 2.x) ---
  nifi:
    image: apache/nifi:2.0.0
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=DataEngineering2026!
      - BIGTABLE_EMULATOR_HOST=bigtable:8086
      - NIFI_JVM_HEAP_INIT=8g
      - NIFI_JVM_HEAP_MAX=24g
    volumes:
      - ./nifi/drivers:/opt/nifi/nifi-current/lib/drivers
      - ./nifi/python_extensions:/opt/nifi/nifi-current/python_extensions
      - ./scripts:/opt/nifi/nifi-current/scripts
      - ./data:/opt/nifi/nifi-current/data
      # - ./nifi/conf:/opt/nifi/nifi-current/conf
    networks:
      - data-tier
    mem_limit: 32g
    depends_on:
      kafka:
        condition: service_healthy
      bigtable:
        condition: service_healthy

networks:
  data-tier:
    driver: bridge
