version: "3.9"

services:
  dashboard:
    build:context: ../..
    dockerfile: docker/data_fullstack/Dockerfile
    image: price-intelligence-dashboard:latest
    container_name: price_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro          # mount stats JSON exported by analyst
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STATS_JSON_PATH=/app/data/stats_export.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: price_intelligence_net
    external: true         # shared with airflow / nifi compose network