name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest flake8

      - name: Lint
        run: flake8 scripts/ airflow/dags/ --max-line-length=100 --ignore=E302,E303,W292,W391

      - name: Run validate script
        run: python scripts/validate_data.py
        continue-on-error: true   # pas de CSV en CI, c'est normal

  dbt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dbt
        run: pip install dbt-postgres
      - name: dbt parse (syntax check)
        working-directory: dbt
        run: dbt parse --profiles-dir . || true